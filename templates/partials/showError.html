<div class="error-content" style="text-align: center; padding: 40px 24px; width: 100%; max-width: 480px;">
    <!-- Modern Lottie container with gradient background -->
    <div style="
        width: 140px;
        height: 140px;
        margin: 0 auto 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #F8FAFC, #F1F5F9, #FFFFFF);
        box-shadow: 
            0 6px 25px rgba(94, 114, 228, 0.1),
            0 -3px 10px rgba(255, 255, 255, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 1.5px solid rgba(94, 114, 228, 0.08);
    ">
        <!-- Lottie animation -->
        <div style="width: 100px; height: 100px;">
            <lottie-player 
                src="{{ url_for('static', filename='image/animation/offline.json') }}"
                background="transparent" 
                speed="1" 
                style="width: 100%; height: 100%;"
                loop 
                autoplay>
            </lottie-player>
        </div>
        
        <!-- Small red warning icon on top right -->
        <div style="
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            background: #EF4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4);
        ">
            <i class="fa-solid fa-times" style="color: white; font-size: 12px;"></i>
        </div>
    </div>

    <!-- Modern title -->
    <div style="
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 800;
        color: #DB2D2D;
        letter-spacing: -0.3px;
        line-height: 1.2;
        margin-bottom: 12px;
    ">
        Connection Lost
    </div>

    <!-- Modern description -->
    <div style="
        font-family: 'Inter', sans-serif;
        color: #64748B;
        font-size: 16px;
        font-weight: 500;
        line-height: 1.5;
        letter-spacing: -0.1px;
        margin-bottom: 32px;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
    ">
        It looks like you're offline.<br>Check your internet connection and try again.
    </div>

    <!-- Modern button -->
    <div style="
        margin-bottom: 16px;
    ">
        <button id="retryButton" style="
            padding: 14px 32px;
            background: #5e72e4;
            color: white;
            border: none;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.1px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 16px rgba(94, 114, 228, 0.25);
            transition: all 0.3s ease;
        " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 20px rgba(94, 114, 228, 0.35)';" 
        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 6px 16px rgba(94, 114, 228, 0.25)';">
            <i class="fa-solid fa-wifi" style="font-size: 16px;"></i>
            Retry Connection
        </button>
    </div>

    <!-- Additional help text -->
    <div style="
        font-family: 'Inter', sans-serif;
        color: #94A3B8;
        font-size: 14px;
        font-weight: 500;
    ">
        Tip: Check your WiFi or mobile data
    </div>
</div>
