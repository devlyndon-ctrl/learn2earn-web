<style>
  /* Overlay - Darker version */
.confirmation-dialogue-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5); /* Much darker backdrop */
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

  /* Dialog Box */
  .confirmation-dialogue-box {
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: 0 0 2rem 0 rgba(136, 152, 170, .15);
      border: 1.5px solid var(--primary-color);
      padding: 2rem 2.5rem 1.5rem 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: fadeInScale 0.25s;
  }

  @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95);}
      to { opacity: 1; transform: scale(1);}
  }

  .confirmation-dialogue-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
  }

  .confirmation-dialogue-message {
      font-size: 1rem;
      color: var(--secondary-color);
      margin-bottom: 1.5rem;
  }

  .confirmation-dialogue-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
  }

  .confirmation-dialogue-btn {
      min-width: 100px;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(136, 152, 170, 0.08);
      outline: none;
  }

  .confirmation-dialogue-btn.confirm {
      background: var(--primary-color);
      color: #fff;
      border: 1.5px solid var(--primary-color);
  }
  .confirmation-dialogue-btn.confirm:hover,
  .confirmation-dialogue-btn.confirm:focus {
      background: #324cdd;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(94, 114, 228, 0.18);
  }

  .confirmation-dialogue-btn.cancel {
      background: var(--secondary-color);
      color: #fff;
      border: 1.5px solid var(--secondary-color);
  }
  .confirmation-dialogue-btn.cancel:hover,
  .confirmation-dialogue-btn.cancel:focus {
      background: #525f7f;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(136, 152, 170, 0.18);
  }

  /* Responsive */
  @media (max-width: 500px) {
      .confirmation-dialogue-box {
          padding: 1.25rem 0.75rem 1rem 0.75rem;
      }
      .confirmation-dialogue-title {
          font-size: 1.1rem;
      }
      .confirmation-dialogue-btn {
          min-width: 80px;
          font-size: 0.95rem;
      }
  }
</style>
<div id="confirmationDialogue" class="confirmation-dialogue-overlay" style="display:none;">
  <div class="confirmation-dialogue-box">
    <div class="confirmation-dialogue-title" id="confirmationDialogueTitle"></div>
    <div class="confirmation-dialogue-message" id="confirmationDialogueMessage"></div>
    <div class="confirmation-dialogue-actions">
      <button class="confirmation-dialogue-btn confirm" id="confirmationDialogueConfirmBtn">Confirm</button>
      <button class="confirmation-dialogue-btn cancel" id="confirmationDialogueCancelBtn">Cancel</button>
    </div>
  </div>
</div>
