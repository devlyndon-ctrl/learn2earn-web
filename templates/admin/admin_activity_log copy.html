{% extends "base.html" %}

{% block title %}Admin Activity Log - Learn2Earn{% endblock %}

{% block page_title %}Activity Log{% endblock %}

{% block admin_content %}

<style>
.modal-dialog-centered {
    display: flex;
    align-items: center;
    min-height: calc(100vh - 1rem);
}

@media (min-width: 576px) {
    .modal-dialog-centered {
        min-height: calc(100vh - 3.5rem);
    }
}

/* Additional styles to ensure the modal appears at the top-center */
.modal-dialog-centered {
    justify-content: center;
    align-items: flex-start;
    padding-top: 10vh; /* Adjust this value to position higher or lower */
}

/* Header styling for inline title and export button */
.page-header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding: 0 0.5rem;
}

.page-title {
    margin: 0;
    color: #495057;
    font-weight: 600;
}

.export-btn {
    background: linear-gradient(135deg, #198754, #157347);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-weight: 500;
    transition: all 0.3s ease;
    box-shadow: 0 2px 4px rgba(25, 135, 84, 0.3);
}

.export-btn:hover {
    background: linear-gradient(135deg, #157347, #198754);
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(25, 135, 84, 0.4);
}

/* Card styling enhancements */
.card {
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
}

.card-body {
    padding: 1.5rem;
}

/* Table styling enhancements */
.table {
    margin-bottom: 0;
}

.table thead th {
    background-color: #f8f9fa;
    border-bottom: 2px solid #e9ecef;
    font-weight: 600;
    color: #495057;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
}

.table tbody tr:hover {
    background-color: #f8f9fa;
}

/* Filter styling */
.form-label {
    font-weight: 500;
    color: #495057;
    margin-bottom: 0.5rem;
}

.form-select, .form-control {
    border-radius: 6px;
    border: 1px solid #e9ecef;
    transition: all 0.3s ease;
}

.form-select:focus, .form-control:focus {
    border-color: #5e72e4;
    box-shadow: 0 0 0 0.2rem rgba(94, 114, 228, 0.25);
}



/* Details button styling */
.details-btn {
    color: #5e72e4;
    transition: all 0.3s ease;
}

.details-btn:hover {
    color: #825EE4;
    transform: scale(1.1);
}

/* Striped row styling */
.striped-row {
    background-color: #fafbfe;
}
</style>

<!-- Add SheetJS CDN in your <head> or before </body> -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<div class="container mt-4">
    <!-- Updated Header Section with inline title and export button -->
    <div class="page-header-container">
        <h5 class="page-title"><i class="fas fa-history me-2"></i>Activity Log</h5>
        <button id="exportExcelBtn" class="btn btn-success export-btn">
            <i class="fas fa-file-excel me-1"></i> Export to Excel
        </button>
    </div>
    
    <div class="card">
        <div class="card-body">
            <!-- Filters -->
            <div class="mb-4 row">
                <div class="col-md-3">
                    <label for="historyFilter" class="form-label">Activity:</label>
                    <select id="historyFilter" class="form-select">
                        <!-- Loaded Dynamically -->
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="roleFilter" class="form-label">Role:</label>
                    <select id="roleFilter" class="form-select">
                        <option value="all">All Roles</option>
                        <option value="Admin">Admin</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Student">Student</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="dateFrom" class="form-label">From:</label>
                    <input type="date" id="dateFrom" class="form-control">
                </div>
                <div class="col-md-3">
                    <label for="dateTo" class="form-label">To:</label>
                    <input type="date" id="dateTo" class="form-control">
                </div>
            </div>
            <div class="mb-4 row">
                <div class="col-md-6">
                    <input type="text" id="searchName" class="form-control" placeholder="Search by user name...">
                </div>
            </div>
            
            <!-- Activity Table -->
            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th class="text-center">Date & Time</th>
                            <th class="text-center">User</th>
                            <th class="text-center">Activity</th>
                            <th class="text-center">Details</th>
                        </tr>
                    </thead>
                    <tbody id="activity-log-body">
                        <!-- Activity log rows will be inserted here by JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <nav class="mt-3">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- Pagination will be generated by JavaScript -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Update the modal HTML structure -->
<div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailsModalLabel">Activity Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="detailsModalBody">
        <!-- Details will be injected here -->
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let allLogs = [];
    let filteredLogs = [];
    let currentPage = 1;
    const itemsPerPage = 10;
    let searchQuery = '';

    function renderTable(logs, page = 1) {
        const tbody = document.getElementById('activity-log-body');
        tbody.innerHTML = '';

        if (logs.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="text-center text-muted py-4">
                        <i class="fas fa-search fa-2x mb-3" style="opacity: 0.3;"></i>
                        <p class="mb-0">No activity logs found.</p>
                        <small class="text-muted">Try adjusting your filters or search criteria.</small>
                    </td>
                </tr>
            `;
            renderPagination(0, page);
            return;
        }

        const startIndex = (page - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const paginatedLogs = logs.slice(startIndex, endIndex);

        paginatedLogs.forEach((log, idx) => {
            const user = log.user_info || {};
            const name = user.first_name && user.last_name ? `${user.first_name} ${user.last_name}` : 'Unknown';
            const role = user.role || log.user_role || 'N/A';
            let profilePic = '/static/image/default-avatar.png';
            if (user.profile_pictures && user.profile_pictures.file_path) {
                profilePic = user.profile_pictures.file_path;
            }
            let date = '';
            if (log.created_at) {
                const dt = new Date(log.created_at);
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                const dateStr = dt.toLocaleDateString('en-US', options);
                let hours = dt.getHours();
                const minutes = dt.getMinutes().toString().padStart(2, '0');
                const ampm = hours >= 12 ? 'pm' : 'am';
                hours = hours % 12 || 12;
                const timeStr = `${hours}:${minutes} ${ampm}`;
                date = `${dateStr}<br><span class="text-muted small">${timeStr}</span>`;
            }
            // Only render activities that exist in Supabase (already filtered by backend)
            const row = `
                <tr class="${idx % 2 === 0 ? 'striped-row' : ''}">
                    <td class="text-center">${date}</td>
                    <td class="text-center">
                        <div style="display: flex; align-items: center; justify-content: center;">
                            <img src="${profilePic}" alt="Profile Picture" style="width:32px;height:32px;border-radius:50%;object-fit:cover;margin-right:8px;">
                            <div>
                                ${name}<br>
                                <small class="text-muted">${role}</small>
                            </div>
                        </div>
                    </td>
                    <td class="text-center">${log.activity || ''}</td>
                    <td class="text-center">
                        <button class="btn btn-link p-0 details-btn" data-idx="${startIndex + idx}" title="View Details">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });

        renderPagination(logs.length, page);

        // Attach click handlers for details
        document.querySelectorAll('.details-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.getAttribute('data-idx'));
                showDetailsModal(filteredLogs[idx]);
            });
        });
    }

    function renderPagination(totalItems, currentPageNum) {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        const totalPages = Math.ceil(totalItems / itemsPerPage);

        if (totalPages <= 1) {
            // Only show page 1 if there's only 1 page
            if (totalPages === 1) {
                pagination.innerHTML = `
                    <li class="page-item active">
                        <a class="page-link" href="#" data-page="1">1</a>
                    </li>
                `;
            }
            return;
        }

        // Previous button
        const prevDisabled = currentPageNum === 1 ? 'disabled' : '';
        pagination.innerHTML += `
            <li class="page-item ${prevDisabled}">
                <a class="page-link" href="#" data-page="${currentPageNum - 1}">Previous</a>
            </li>
        `;

        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
            const active = i === currentPageNum ? 'active' : '';
            pagination.innerHTML += `
                <li class="page-item ${active}">
                    <a class="page-link" href="#" data-page="${i}">${i}</a>
                </li>
            `;
        }

        // Next button
        const nextDisabled = currentPageNum === totalPages ? 'disabled' : '';
        pagination.innerHTML += `
            <li class="page-item ${nextDisabled}">
                <a class="page-link" href="#" data-page="${currentPageNum + 1}">Next</a>
            </li>
        `;

        // Add click event listeners to pagination links
        pagination.querySelectorAll('.page-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const page = parseInt(this.getAttribute('data-page'));
                if (page && page !== currentPageNum && page >= 1 && page <= totalPages) {
                    currentPage = page;
                    renderTable(filteredLogs, currentPage);
                }
            });
        });
    }

    function applyFiltersAndRender() {
        const activityValue = document.getElementById('historyFilter').value;
        const roleValue = document.getElementById('roleFilter').value;
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;
        searchQuery = document.getElementById('searchName').value.trim().toLowerCase();
        filteredLogs = [...allLogs];

        // Activity filter
        if (activityValue !== 'all') {
            filteredLogs = filteredLogs.filter(log => {
                // Match activity exactly or contains (case-insensitive)
                return (log.activity && log.activity.toLowerCase() === activityValue.toLowerCase()) ||
                       (log.activity && log.activity.toLowerCase().includes(activityValue.toLowerCase()));
            });
        }

        // Role filter
        if (roleValue !== 'all') {
            filteredLogs = filteredLogs.filter(log => {
                const user = log.user_info || {};
                const role = (user.role || log.user_role || '').toLowerCase();
                return role === roleValue.toLowerCase();
            });
        }

        // Date range filter
        if (dateFrom) {
            filteredLogs = filteredLogs.filter(log => {
                if (!log.created_at) return false;
                const logDate = new Date(log.created_at);
                return logDate >= new Date(dateFrom);
            });
        }
        if (dateTo) {
            filteredLogs = filteredLogs.filter(log => {
                if (!log.created_at) return false;
                const logDate = new Date(log.created_at);
                const toDate = new Date(dateTo);
                toDate.setDate(toDate.getDate() + 1);
                return logDate < toDate;
            });
        }

        // Name search filter
        if (searchQuery) {
            filteredLogs = filteredLogs.filter(log => {
                const user = log.user_info || {};
                const name = ((user.first_name || '') + ' ' + (user.last_name || '')).toLowerCase();
                return name.includes(searchQuery);
            });
        }

        currentPage = 1; // Reset to first page when filtering
        renderTable(filteredLogs, currentPage);
    }

    function showDetailsModal(log) {
    const user = log.user_info || {};
    const name = user.first_name && user.last_name ? `${user.first_name} ${user.last_name}` : 'Unknown';
    const role = user.role || log.user_role || 'N/A';
    let profilePic = '/static/image/default-avatar.png';
    if (user.profile_pictures && user.profile_pictures.file_path) {
        profilePic = user.profile_pictures.file_path;
    }
    let date = '';
    if (log.created_at) {
        const dt = new Date(log.created_at);
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = dt.toLocaleDateString('en-US', options);
        let hours = dt.getHours();
        const minutes = dt.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'pm' : 'am';
        hours = hours % 12 || 12;
        const timeStr = `${hours}:${minutes} ${ampm}`;
        date = `${dateStr} ${timeStr}`;
    }
    
    // Format details with proper line breaks - more compact
    let formattedDetails = '';
    if (log.details) {
        const lines = log.details.split('\n');
        formattedDetails = lines.map(line => {
            if (line.includes(':')) {
                const [key, value] = line.split(':').map(part => part.trim());
                return `<div class="detail-item">
                    <span class="detail-key">${key}:</span>
                    <span class="detail-value">${value}</span>
                </div>`;
            }
            return `<div class="detail-line">${line}</div>`;
        }).join('');
    }

    // Build details HTML with table-like alignment
    const html = `
        <div class="mb-2 text-center">
            <img src="${profilePic}" alt="Profile Picture" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
            <div class="mt-1">
                <strong class="small">${name}</strong><br>
                <small class="text-muted">${role}</small>
            </div>
        </div>
        <div class="activity-details">
            <div class="detail-row">
                <span class="detail-label">Date & Time:</span>
                <span class="detail-content">${date}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Activity:</span>
                <span class="detail-content">${log.activity || 'N/A'}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Action:</span>
                <span class="detail-content">${log.action || 'N/A'}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Description:</span>
                <span class="detail-content">${log.description || 'N/A'}</span>
            </div>
            <div class="detail-row detail-row-multiline">
                <span class="detail-label">Details:</span>
                <div class="detail-content details-multiline">
                    ${formattedDetails || 'N/A'}
                </div>
            </div>
        </div>
    `;
    
    document.getElementById('detailsModalBody').innerHTML = html;
    
    // Add CSS for proper alignment and compact spacing
    const style = document.createElement('style');
    style.textContent = `
        .activity-details {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 0.5rem;
        }
        .detail-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.3rem;
            min-height: 24px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
        }
        .detail-label {
            font-weight: 600;
            color: #495057;
            width: 110px;
            flex-shrink: 0;
            font-size: 0.85rem;
            line-height: 1.2;
        }
        .detail-content {
            color: #6c757d;
            flex: 1;
            font-size: 0.85rem;
            line-height: 1.2;
            word-break: break-word;
        }
        .detail-row-multiline {
            align-items: flex-start;
        }
        .details-multiline {
            white-space: pre-line;
            line-height: 1.2;
        }
        .detail-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.1rem;
            min-height: 18px;
        }
        .detail-item:last-child {
            margin-bottom: 0;
        }
        .detail-key {
            font-weight: 500;
            color: #495057;
            width: 100px;
            flex-shrink: 0;
            font-size: 0.8rem;
            line-height: 1.2;
        }
        .detail-value {
            color: #6c757d;
            flex: 1;
            font-size: 0.8rem;
            line-height: 1.2;
            word-break: break-word;
        }
        .detail-line {
            margin-bottom: 0.1rem;
            font-size: 0.8rem;
            line-height: 1.2;
        }
        #detailsModal .modal-dialog {
            max-width: 480px;
        }
        #detailsModal .modal-content {
            border-radius: 8px;
        }
        #detailsModal .modal-header {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #dee2e6;
        }
        #detailsModal .modal-body {
            padding: 0.8rem;
        }
        /* Ensure all content aligns properly */
        .detail-row > .detail-label,
        .detail-row > .detail-content,
        .detail-item > .detail-key,
        .detail-item > .detail-value {
            vertical-align: top;
            padding-top: 0;
        }
    `;
    
    // Remove existing style if any and add new one
    const existingStyle = document.getElementById('details-modal-style');
    if (existingStyle) {
        existingStyle.remove();
    }
    style.id = 'details-modal-style';
    document.head.appendChild(style);
    
    // Show modal
    const modal = new bootstrap.Modal(document.getElementById('detailsModal'));
    modal.show();
}

    // Add this function before applyFiltersAndRender
function populateActivityFilterOptions(logs) {
    const activitySet = new Set();
    logs.forEach(log => {
        if (log.activity) {
            activitySet.add(log.activity);
        }
    });
    const historyFilter = document.getElementById('historyFilter');
    historyFilter.innerHTML = '<option value="all">All Activities</option>';
    Array.from(activitySet).sort().forEach(activity => {
        historyFilter.innerHTML += `<option value="${activity}">${activity}</option>`;
    });
}

// Filter event listeners
    document.getElementById('historyFilter').addEventListener('change', applyFiltersAndRender);
    document.getElementById('roleFilter').addEventListener('change', applyFiltersAndRender);
    document.getElementById('dateFrom').addEventListener('change', applyFiltersAndRender);
    document.getElementById('dateTo').addEventListener('change', applyFiltersAndRender);
    document.getElementById('searchName').addEventListener('input', applyFiltersAndRender);

    // Fetch data
    fetch('/api/admin-activity-log')
    .then(response => response.json())
    .then(data => {
        if (data.success && data.logs.length > 0) {
            allLogs = data.logs;
            populateActivityFilterOptions(allLogs); // <-- Add this line
            applyFiltersAndRender();
        } else {
            allLogs = [];
            populateActivityFilterOptions([]); // <-- Clear options if no logs
            applyFiltersAndRender();
        }
    })
    .catch(error => {
        console.error('Error fetching activity log:', error);
        allLogs = [];
        populateActivityFilterOptions([]); // <-- Clear options on error
        applyFiltersAndRender();
    });

    // Enhanced Export to Excel function with beautiful formatting
    function exportToExcel(logs) {
        if (!logs.length) {
            showToast('No data to export!', 'error', 3000);
            return;
        }

        // Get current date and time for the report
        const now = new Date();
        const currentDate = now.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
        const currentTime = now.toLocaleTimeString('en-US', { 
            hour: 'numeric', 
            minute: '2-digit',
            hour12: true 
        });

        // Prepare data with enhanced formatting
        const data = logs.map(log => {
            const user = log.user_info || {};
            let dateTime = '';
            if (log.created_at) {
                const dt = new Date(log.created_at);
                const dateStr = dt.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
                let hours = dt.getHours();
                const minutes = dt.getMinutes().toString().padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const timeStr = `${hours}:${minutes} ${ampm}`;
                dateTime = `${dateStr} ${timeStr}`;
            }
            
            return {
                'Date & Time': dateTime,
                'User': user.first_name && user.last_name ? `${user.first_name} ${user.last_name}` : 'Unknown',
                'Role': user.role || log.user_role || 'N/A',
                'Activity': log.activity || '',
                'Action': log.action || '',
                'Description': log.description || '',
                'Details': log.details || ''
            };
        });

        // Create workbook and worksheet
        const wb = XLSX.utils.book_new();
        
        // Create header rows
        const headerRows = [
            ["Learn2Earn"],
            ["Masico National High School"],
            ["Activity Log Report - " + currentDate + " at " + currentTime],
            [], // Empty row
            ["SUMMARY STATISTICS"],
            ["Total Activities:", logs.length],
            ["Unique Users:", new Set(logs.map(log => {
                const user = log.user_info || {};
                return user.first_name && user.last_name ? `${user.first_name} ${user.last_name}` : 'Unknown';
            })).size],
            ["Date Range:", "From " + (document.getElementById('dateFrom').value || 'Start') + " to " + (document.getElementById('dateTo').value || 'End')],
            [], // Empty row
            ["ACTIVITY LOG DATA"]
        ];

        // Convert data to worksheet format
        const wsData = [
            ...headerRows,
            Object.keys(data[0]), // Column headers
            ...data.map(row => Object.values(row))
        ];

        const ws = XLSX.utils.aoa_to_sheet(wsData);

        // Set column widths for better readability
        ws['!cols'] = [
            { wch: 20 }, // Date & Time
            { wch: 25 }, // User
            { wch: 12 }, // Role
            { wch: 25 }, // Activity
            { wch: 20 }, // Action
            { wch: 30 }, // Description
            { wch: 40 }  // Details
        ];

        // Merge header cells
        ws['!merges'] = [
            { s: { r: 0, c: 0 }, e: { r: 0, c: 6 } }, // Learn2Earn
            { s: { r: 1, c: 0 }, e: { r: 1, c: 6 } }, // School name
            { s: { r: 2, c: 0 }, e: { r: 2, c: 6 } }, // Report title
            { s: { r: 4, c: 0 }, e: { r: 4, c: 6 } }, // SUMMARY STATISTICS
            { s: { r: 9, c: 0 }, e: { r: 9, c: 6 } }  // ACTIVITY LOG DATA
        ];

        // Add worksheet to workbook
        XLSX.utils.book_append_sheet(wb, ws, "Activity Log");
        
        // Generate filename with timestamp
        const timestamp = new Date().toISOString().split('T')[0];
        const filename = `Learn2Earn_Activity_Log_${timestamp}.xlsx`;
        
        // Export the file
        XLSX.writeFile(wb, filename);
        // Show export success toast
        showToast('Exported successfully!', 'success', 3000);
    }


    // Export button event listener
    document.getElementById('exportExcelBtn').addEventListener('click', function() {
        exportToExcel(filteredLogs);
    });

    // Toast notification function
function showToast(message, type = 'success', duration = 4000) {
    document.querySelectorAll('.toast-notification').forEach(toast => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
    });
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type === 'error' ? 'error' : 'success'}`;
    let icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
    toast.innerHTML = `<div class="toast-content"><i class="fas ${icon} me-2"></i>${message}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.classList.add('show'); }, 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
    }, duration);
    toast.addEventListener('click', function() {
        this.classList.remove('show');
        setTimeout(() => { if (this.parentNode) this.parentNode.removeChild(this); }, 300);
    });
}

// Show toast when page loads
showToast('Analytics Loaded Successfully!', 'success', 3000);
});
</script>
