{% extends "base.html" %}

{% block title %}Learn2Earn - Activity History{% endblock %}

{% block page_title %}Activity History{% endblock %}

{% block main_content %}
<style>
/* ===== ACTIVITY SECTION ===== */

.recent-activity-section {
    margin-bottom: 2rem;
}

.activity-title-row {
    display: flex;
    align-items: center;
    margin-bottom: 1rem;
}

.activity-gradient-bar {
    width: 4px;
    height: 24px;
    background: linear-gradient(135deg, #5e72e4, #8a2be2);
    border-radius: 2px;
    margin-right: 12px;
}

.activity-title-text {
    font-weight: 700;
    font-size: 1.5rem;
    color: #32325d;
}

.activity-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.activity-card {
    background: #fff;
    border-radius: 0.5rem;
    box-shadow: 0 0 1rem 0 rgba(136, 152, 170, .08);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
}

.activity-icon-container {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1rem;
}

.activity-card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.activity-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.activity-card-title {
    font-weight: 600;
    color: #32325d;
}

.activity-card-status {
    color: #8898aa;
    font-size: 0.9rem;
}

.activity-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
}

.activity-footer-badge {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: #f9fafb;
    border-radius: 16px;
    border: 1px solid rgba(160,160,160,0.10);
    padding: 0.32rem 0.7rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: #757575;
    min-width: 0;
    white-space: nowrap;
}

.activity-footer-badge i {
    color: #9e9e9e;
    font-size: 1.1rem;
    margin-right: 0.25rem;
}

/* Enhanced Activity Card Styles */
.enhanced-activity-card {
    box-shadow: 0 4px 16px rgba(31,41,55,0.08), 0 2px 6px rgba(31,41,55,0.04);
    border-radius: 1.25rem;
    padding: 1.5rem 1.5rem 1.2rem 1.5rem;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: flex-start;
    border: 1.5px solid rgba(128,128,128,0.06);
    background: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
}

.enhanced-activity-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(31,41,55,0.12), 0 4px 12px rgba(31,41,55,0.06);
}

.enhanced-activity-icon-container {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.7rem;
    margin-right: 1.1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    flex-shrink: 0;
}

/* Search and Filter Section (from Reward History) */
.search-filter-section {
    margin-bottom: 2rem;
}

.search-container {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: #FFFFFF;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.filter-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    width: 100%;
}

.search-box {
    display: flex;
    align-items: center;
    flex: 1;
    min-width: 250px;
}

.search-box i {
    color: #9E9E9E;
    margin-right: 10px;
}

.search-box input {
    border: none;
    outline: none;
    width: 100%;
    font-size: 16px;
    color: #1F2937;
    background: transparent;
    border-bottom: 2.5px solid #8d98e8;
    transition: border-color 0.2s;
    padding-bottom: 4px;
}

.search-box input:focus {
    border-bottom: 2.5px solid #465fe9;
}

.search-box input::placeholder {
    color: #9E9E9E;
}

.filter-tabs-container {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    width: 100%;
}

.filter-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
}

.filter-tab {
    background: #fff;
    color: #8d98e8;
    border: 2px solid #8d98e8;
    border-radius: 2rem;
    padding: 0.5rem 1.2rem;
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s;
    cursor: pointer;
    outline: none;
    white-space: nowrap;
    flex-shrink: 0;
}

.filter-tab i {
    color: #8d98e8;
    font-size: 1.1em;
}

.filter-tab.active,
.filter-tab:active,
.filter-tab:focus {
    background: linear-gradient(135deg, #4661E9 0%, #797EEB 50%, #8E69F4 100%);
    color: #fff;
    border-color: #8d98e8;
    box-shadow: 0 4px 8px rgba(70, 97, 233, 0.3);
}

.filter-tab.active i,
.filter-tab:active i,
.filter-tab:focus i {
    color: #fff;
}

.filter-tab:hover:not(.active) {
    background: #f0f2ff;
    transform: translateY(-2px);
}

/* Activities Grid (3x3 layout like Reward History) */
.activities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

/* Loading and Empty States */
.loading-achievements {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    text-align: center;
    padding: 2rem;
}

.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #6c757d;
    grid-column: 1 / -1;
}

.empty-state i {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.5;
}

/* Activity Details Modal Styles - UPDATED TO MATCH REWARD HISTORY */
.modal-activity-points {
    display: inline-block;
    border-radius: 16px;
    padding: 0.5rem 1rem;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.2px;
    border: 1.2px solid;
    white-space: nowrap;
}

.modal-activity-points.gained {
    background: rgba(94,114,228,0.10);
    color: #5e72e4;
    border-color: rgba(94,114,228,0.40);
}

.modal-activity-points.lost {
    background: rgba(239,68,68,0.10);
    color: #EF4444;
    border-color: rgba(239,68,68,0.40);
}

.modal-stats-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
}

.stat-card {
    flex: 1;
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px;
    border-radius: 12px;
    border: 1.2px solid rgba(31,41,55,0.06);
    box-shadow: 0 2px 6px rgba(31,41,55,0.04);
    background: #fff;
}

.stat-icon {
    padding: 6px;
    border-radius: 50%;
    background: rgba(255,215,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
}

.stat-icon i { color: #F5A623; font-size: 14px; }
.stat-text .stat-label { font-size: 10px; color: #6B7280; font-weight: 600; }
.stat-text .stat-value { font-weight: 500; font-size: 14px; color: #111827; }

/* UPDATED TEACHER CARD STYLES - MATCHES "REDEEMED FROM" DESIGN */
.teacher-card {
    margin-top: 18px;
    padding: 14px;
    border-radius: 16px;
    border: 1.2px solid rgba(31,41,55,0.06);
    background: #fff;
}

.teacher-header { 
    font-weight: 800; 
    font-size: 12px; 
    color: #6B7280; 
    letter-spacing: -0.2px; 
    margin-bottom: 12px;
}

.teacher-row {
    display: flex;
    gap: 12px;
    align-items: center;
}

.teacher-row img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.2px solid rgba(31,41,55,0.06);
    background: rgba(94,114,228,0.06);
}

.teacher-info .teacher-name { 
    font-weight: 500; 
    color: #111827; 
    font-size: 14px; 
    margin-bottom: 4px;
}

.teacher-info .teacher-subject { 
    display: inline-block; 
    padding: 6px 8px; 
    border-radius: 8px; 
    background: rgba(94,114,228,0.08); 
    color: #5e72e4; 
    font-weight: 700; 
    font-size: 11px; 
}

.modal-badges {
    margin-top: 14px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}
.status-badge {
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:10px;
    font-weight:800;
    font-size:11px;
    border:1.2px solid rgba(0,0,0,0.06);
}
.status-used { background: rgba(16,185,129,0.08); color:#10B981; border-color: rgba(16,185,129,0.2); }
.status-unused { background: rgba(245,158,66,0.08); color:#F59E42; border-color: rgba(245,158,66,0.16); }
.info-badge { background:#F8FAFF; border-radius:10px; padding:8px 12px; display:flex; gap:8px; align-items:center; border:1px solid rgba(31,41,55,0.06); color:#5e72e4; font-weight:700; font-size:11px; }

/* Modal Card Styles - ADDED TO MATCH REWARD HISTORY */
.modal-card {
    margin-top: 20px;
    padding: 18px;
    border-radius: 20px;
    border: 1.5px solid rgba(31,41,55,0.06);
    box-shadow: 0 2px 8px rgba(31,41,55,0.06);
    background: #fff;
}
.modal-card-row {
    display: flex;
    gap: 16px;
    align-items: center;
}
.modal-icon {
    padding: 12px;
    border-radius: 16px;
    min-width: 56px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.06);
}
.modal-icon i {
    font-size: 24px;
}
.modal-card-content {
    flex: 1;
}
.modal-reward-title {
    font-weight: 500;
    font-size: 18px;
    color: #111827;
    letter-spacing: -0.3px;
}
.modal-reward-desc {
    font-size: 13px;
    color: #4b5563;
    margin-top: 6px;
    line-height: 1.4;
}

.notes-box {
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    background: #FBFBFD;
    border: 1.2px solid rgba(31,41,55,0.06);
    color: #374151;
    font-size: 13px;
}

/* Bootstrap modal positioning - at top center */
.modal-dialog-centered {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: calc(100vh - 1rem);
    padding-top: 3rem;
}

/* Slightly different padding on wider screens */
@media (min-width: 576px) {
    .modal-dialog-centered {
        min-height: calc(100vh - 3.5rem);
        padding-top: 2rem;
    }
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .enhanced-activity-card {
        padding: 1rem;
        border-radius: 1rem;
    }
    .enhanced-activity-icon-container {
        width: 44px;
        height: 44px;
        font-size: 1.2rem;
        margin-right: 0.7rem;
    }
    
    .filter-row {
        flex-direction: column;
    }
    
    .filter-group {
        min-width: 100%;
    }

    .filter-tabs-container {
        flex-direction: column;
        align-items: stretch;
    }

    .filter-tabs {
        flex-direction: column;
        width: 100%;
    }
    
    .filter-tab {
        width: 100%;
        justify-content: center;
    }

    .activities-grid {
        grid-template-columns: 1fr;
    }

    .modal-stats-row {
        flex-direction: column;
    }
}

@media (max-width: 480px) {
    .activities-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="container mt-4">
    <!-- Search and Filter Section (Unified Design from Reward History) -->
    <div class="search-filter-section">
        <div class="search-container">
            <div class="filter-row">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search your activities..." id="activitySearchInput">
                </div>
            </div>
            <div class="filter-tabs-container">
                <!-- Activity Type Filter Tabs -->
                <div class="filter-tabs">
                    <button class="filter-tab active" data-type="all">
                        <i class="fas fa-list"></i> All Activities
                    </button>
                    <button class="filter-tab" data-type="reward">
                        <i class="fas fa-gift"></i> Rewards
                    </button>
                    <button class="filter-tab" data-type="milestone">
                        <i class="fas fa-trophy"></i> Milestones
                    </button>
                    <button class="filter-tab" data-type="star">
                        <i class="fas fa-star"></i> Awards
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Activities Grid (3x3 layout like Reward History) -->
    <div class="activities-grid" id="activitiesGrid">
        <!-- Activity cards will be rendered here -->
    </div>

    <!-- No Activities Message -->
    <div class="no-rewards-container" id="noActivitiesMessage" style="display: none;">
        <i class="fas fa-history no-rewards-icon"></i>
        <h3 class="no-rewards-title">No Activities Yet</h3>
        <p class="no-rewards-subtitle">Complete activities and earn points to see your activity history here!</p>
    </div>

    <!-- Load More Button -->
    <div id="loadMoreContainer" class="text-center mt-4" style="display: none;">
        <button class="btn btn-outline-primary" id="loadMoreBtn">
            <i class="fas fa-arrow-down me-2"></i>Load More Activities
        </button>
    </div>
</div>

<!-- Activity Details Modal - UPDATED TO MATCH REWARD HISTORY CENTERING -->
<div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detailsModalLabel">Activity Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="detailsModalBody">
                <!-- Details will be injected here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-primary w-100" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentPage = 1;
    let hasMoreActivities = true;
    let currentType = 'all';
    let searchTerm = '';
    let allActivities = [];
    let filteredActivities = [];

    // DOM Elements
    const activitiesGrid = document.getElementById('activitiesGrid');
    const noActivitiesMessage = document.getElementById('noActivitiesMessage');
    const loadMoreContainer = document.getElementById('loadMoreContainer');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const activitySearchInput = document.getElementById('activitySearchInput');

    // Modal Elements - UPDATED TO USE BOOTSTRAP MODAL
    const detailsModal = new bootstrap.Modal(document.getElementById('detailsModal'));
    const detailsModalBody = document.getElementById('detailsModalBody');

    // Remember scroll position so we can return after closing modal
    let _lastScrollY = 0;
    const detailsModalEl = document.getElementById('detailsModal');

    // When modal is about to open, save current scroll and scroll to top
    detailsModalEl.addEventListener('show.bs.modal', function () {
        _lastScrollY = window.scrollY || window.pageYOffset || 0;
        // Scroll to top so modal appears at top of viewport
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // When modal closes, return to previous scroll position
    detailsModalEl.addEventListener('hidden.bs.modal', function () {
        // Restore previous scroll position
        window.scrollTo({ top: _lastScrollY, behavior: 'smooth' });
    });

    // Filter tabs
    const filterTabs = document.querySelectorAll('.filter-tab');
    
    // Function to get icon and color for activity type
    function getIconAndColor(type) {
        switch (type) {
            case 'streak': return { icon: 'fa-fire', color: '#ffa500' };
            case 'reward': return { icon: 'fa-gift', color: '#4CAF50' };
            case 'task': return { icon: 'fa-circle-check', color: '#5e72e4' };
            case 'milestone': return { icon: 'fa-trophy', color: '#5e72e4' };
            case 'star': return { icon: 'fa-star', color: '#FFD700' };
            default: return { icon: 'fa-bell', color: '#9e9e9e' };
        }
    }

    // Function to format points display for modal
    function formatPointsForModal(points) {
        if (points === null || points === undefined || points === 0) return '';
        const pointsClass = points > 0 ? 'gained' : 'lost';
        const pointsSign = points > 0 ? '+' : '';
        return `<span class="modal-activity-points ${pointsClass}">${pointsSign}${points}</span>`;
    }

    // Function to format date time
    function formatDateTime(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        if (isNaN(date)) return dateStr;
        const options = {
            month: 'short', day: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true,
            timeZone: 'Asia/Manila'
        };
        const localeString = date.toLocaleString('en-US', options);
        return localeString.replace(',', ' •');
    }

    // Function to open activity details modal - UPDATED WITH NEW TEACHER DESIGN
    function openActivityDetails(activity) {
        const { icon, color } = getIconAndColor(activity.type);
        const pointsHtml = formatPointsForModal(activity.points);
        const dateTimeStr = formatDateTime(activity.time || activity.processed_at || activity.completed_at);
        
        // Clean description - remove "Awarded by" text from status/description
        let description = activity.description || '';
        let status = activity.status || '';
        
        // Remove "Awarded by" text from status if it exists
        if (status.includes('Awarded by')) {
            status = ''; // Clear the status since we'll show teacher info separately
        }
        
        // If description contains "Awarded by", clean it too
        if (description.includes('Awarded by')) {
            description = description.replace(/Awarded by\s+[^\n]+/, '').trim();
        }
        
        // Build modal content using the new structure with teacher section
        let modalContent = `
            <div class="modal-card">
                <div class="modal-card-row">
                    <div class="modal-icon" style="background: ${color}20;">
                        <i class="fas ${icon}" style="color:${color};"></i>
                    </div>
                    <div class="modal-card-content">
                        <div class="modal-reward-title">${activity.title || activity.task || activity.reward_name || 'Activity'}</div>
                        <div class="modal-reward-desc">${description}</div>
                    </div>
                    ${pointsHtml}
                </div>
            </div>

            <div class="modal-stats-row">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                    <div class="stat-text">
                        <div class="stat-label">Date & Time</div>
                        <div class="stat-value">${dateTimeStr}</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-tag"></i></div>
                    <div class="stat-text">
                        <div class="stat-label">Activity</div>
                        <div class="stat-value">${activity.type?.charAt(0).toUpperCase() + activity.type?.slice(1) || 'General'}</div>
                    </div>
                </div>
            </div>
        `;

        // Add teacher info section - using the exact same layout as reference
        if (activity.teacher || activity.teacher_name || activity.awarded_by) {
            const teacherAvatar = activity.teacher_avatar || activity.awarded_by_avatar || '/static/image/default-avatar.png';
            const teacherName = activity.teacher || activity.teacher_name || activity.awarded_by || 'Unknown Teacher';
            const teacherSubject = activity.teacher_subject || activity.awarded_by_subject || 'General';
            
            modalContent += `
                <div class="teacher-card">
                    <div class="teacher-header">Awarded By</div>
                    <div class="teacher-row">
                        <img src="${teacherAvatar}" onerror="this.src='/static/image/default-avatar.png'">
                        <div class="teacher-info">
                            <div class="teacher-name">${teacherName}</div>
                            <div class="teacher-subject">${teacherSubject}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Add status badge (only if status is not empty and doesn't contain "Awarded by")
        if (status && !status.includes('Awarded by')) {
            modalContent += `
                <div class="modal-badges">
                    <div class="status-badge status-unused">
                        <i class="fas fa-info-circle"></i>
                        <span>${status}</span>
                    </div>
                    ${activity.notes ? `<div class="info-badge"><i class="fas fa-sticky-note"></i><span>Has Notes</span></div>` : ''}
                </div>
            `;
        } else {
            // If no valid status, just show the notes badge if available
            if (activity.notes) {
                modalContent += `
                    <div class="modal-badges">
                        <div class="info-badge"><i class="fas fa-sticky-note"></i><span>Has Notes</span></div>
                    </div>
                `;
            }
        }

        // Add notes if available
        if (activity.notes) {
            modalContent += `
                <div class="notes-box">
                    <strong>Notes:</strong>
                    <div style="margin-top:4px;">${activity.notes}</div>
                </div>
            `;
        }

        detailsModalBody.innerHTML = modalContent;
        detailsModal.show();
    }
   

    // Function to render activity cards in grid layout
    function renderActivityCards(activities, append = false) {
        if (!append) {
            activitiesGrid.innerHTML = '';
        }

        if (activities.length === 0 && !append) {
            activitiesGrid.style.display = 'none';
            noActivitiesMessage.style.display = 'block';
            loadMoreContainer.style.display = 'none';
            return;
        }

        activitiesGrid.style.display = 'grid';
        noActivitiesMessage.style.display = 'none';

        activities.forEach(act => {
            const { icon, color } = getIconAndColor(act.type);
            const dateTimeStr = formatDateTime(act.time || act.processed_at || act.completed_at);

            const activityCard = document.createElement('div');
            activityCard.className = 'enhanced-activity-card';
            activityCard.innerHTML = `
                <div class="enhanced-activity-icon-container" style="background: ${color};">
                    <i class="fas ${icon}"></i>
                </div>
                <div class="activity-card-content">
                    <div class="activity-card-header">
                        <span class="activity-card-title">${act.title || act.task || act.reward_name || ''}</span>
                    </div>
                    <div class="activity-card-status">${act.status || (act.isClaimed ? 'Claimed' : act.isUnlocked ? 'Unlocked' : '')}</div>
                    <div class="activity-card-footer">
                        <span class="activity-footer-badge">
                            <i class="fa-regular fa-clock"></i>
                            ${dateTimeStr}
                        </span>
                    </div>
                </div>
            `;
            
            // Add click event to open modal
            activityCard.addEventListener('click', function() {
                openActivityDetails(act);
            });
            
            activitiesGrid.appendChild(activityCard);
        });

        // Show load more button if there are more activities
        if (hasMoreActivities && !append) {
            loadMoreContainer.style.display = 'block';
        } else if (!hasMoreActivities) {
            loadMoreContainer.style.display = 'none';
        }
    }

    // Function to load activities
    async function loadActivities(page = 1, append = false) {
        if (page === 1) {
            activitiesGrid.innerHTML = `
                <div class="loading-achievements" style="grid-column: 1 / -1;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; color: #5e72e4;"></i>
                    <div style="font-weight: 600; color: #757575; font-size: 1.2rem; margin-top: 1rem;">
                        Loading your activities...
                    </div>
                </div>
            `;
            noActivitiesMessage.style.display = 'none';
            loadMoreContainer.style.display = 'none';
        } else {
            loadMoreBtn.disabled = true;
            loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Loading...';
        }

        try {
            const params = new URLSearchParams({
                page: page,
                type: currentType,
                search: searchTerm
            });

            const response = await fetch(`/api/student-all-activities?${params}`);
            const data = await response.json();

            if (data.success && data.activities) {
                if (page === 1) {
                    allActivities = data.activities;
                } else {
                    allActivities = [...allActivities, ...data.activities];
                }
                
                hasMoreActivities = data.has_more || false;
                renderActivityCards(data.activities, append);
                
                if (hasMoreActivities) {
                    loadMoreContainer.style.display = 'block';
                    loadMoreBtn.disabled = false;
                    loadMoreBtn.innerHTML = '<i class="fas fa-arrow-down me-2"></i>Load More Activities';
                } else {
                    loadMoreContainer.style.display = 'none';
                }

                if (page === 1 && data.activities.length === 0) {
                    noActivitiesMessage.style.display = 'block';
                    activitiesGrid.style.display = 'none';
                }
            } else {
                throw new Error(data.message || 'Failed to load activities');
            }
        } catch (error) {
            console.error('Error loading activities:', error);
            if (!append) {
                activitiesGrid.innerHTML = '';
                noActivitiesMessage.innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    <h4>Failed to load activities</h4>
                    <p>Please try again later.</p>
                    <button class="btn btn-primary mt-2" onclick="loadActivities(1, false)">
                        <i class="fas fa-refresh me-2"></i>Retry
                    </button>
                `;
                noActivitiesMessage.style.display = 'block';
            }
            showToast('Failed to load activities. Please try again.', 'danger');
        }
    }

    // Filter tab handlers
    filterTabs.forEach(tab => {
        tab.addEventListener('click', function() {
            filterTabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentType = this.getAttribute('data-type');
            currentPage = 1;
            loadActivities(1, false);
        });
    });

    // Search input handler
    activitySearchInput.addEventListener('input', function() {
        searchTerm = this.value.trim().toLowerCase();
        currentPage = 1;
        // Add debounce to avoid too many requests
        clearTimeout(this.searchTimeout);
        this.searchTimeout = setTimeout(() => {
            loadActivities(1, false);
        }, 300);
    });

    // Load more handler
    loadMoreBtn.addEventListener('click', function() {
        currentPage++;
        loadActivities(currentPage, true);
    });

    // Initialize
    loadActivities(1, false);

    // Helper function for toast notifications
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.alert.position-fixed');
        if (existingToast) {
            existingToast.remove();
        }

        const toast = document.createElement('div');
        toast.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
        toast.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
        toast.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            if (toast.parentNode) {
                toast.remove();
            }
        }, 5000);
    }
});
</script>
{% endblock %}
